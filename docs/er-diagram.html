    { name: "NotificationType", values: ["BOOKING_CONFIRMED", "BOOKING_CANCELLED", "BOOKING_REMINDER", "PAYMENT_RECEIVED", "PAYOUT_PROCESSED", "VERIFICATION_APPROVED", "VERIFICATION_REJECTED", "REVIEW_RECEIVED", "TESTIMONIAL_RECEIVED", "TICKET_PURCHASED", "ORDER_PLACED", "NEW_MESSAGE"] },
    { name: "SubscriptionStatus", values: ["ACTIVE", "CANCELLED", "PAST_DUE", "TRIALING"] },
    { name: "CartItemType", values: ["PRODUCT", "EVENT_TICKET", "SOUL_TOUR", "SERVICE_BOOKING"] },
    { name: "PaymentType", values: ["FULL", "DEPOSIT", "BALANCE"] },
    { name: "TourBookingStatus", values: ["PENDING", "DEPOSIT_PAID", "FULLY_PAID", "CONFIRMED", "CANCELLED", "COMPLETED"] },
    { name: "PromoCodeType", values: ["PERCENTAGE", "FIXED_AMOUNT"] },
  ]
};

// Render tables
const canvas = document.getElementById('canvas');
schema.domains.forEach(domain => {
  const section = document.createElement('div');
  section.className = 'domain-section';
  section.dataset.domain = domain.domain;

  const title = document.createElement('div');
  title.className = 'domain-title';
  title.textContent = domain.name;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'tables-grid';

  domain.tables.forEach(table => {
    const card = document.createElement('div');
    card.className = 'table-card';
    card.dataset.table = table.name.toLowerCase();
    card.dataset.domain = domain.domain;

    const header = document.createElement('div');
    header.className = 'table-header';
    header.innerHTML = `${table.name} <span class="badge">${table.dbName}</span>`;
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'table-body';

    table.fields.forEach(f => {
      const row = document.createElement('div');
      row.className = 'field-row';
      let badges = '';
      if (f.pk) badges += '<span class="field-badge badge-pk">PK</span>';
      if (f.fk) badges += '<span class="field-badge badge-fk">FK</span>';
      if (f.uk) badges += '<span class="field-badge badge-uk">UQ</span>';
      if (f.idx && !f.pk && !f.uk) badges += '<span class="field-badge badge-idx">IDX</span>';
      row.innerHTML = `<span class="field-name">${f.n}</span><span class="field-type">${f.t}</span>${badges}`;
      body.appendChild(row);
    });
    card.appendChild(body);
    grid.appendChild(card);
  });

  section.appendChild(grid);
  canvas.appendChild(section);
});

// Render relationships
const relGrid = document.getElementById('relGrid');
schema.relationships.forEach(r => {
  const row = document.createElement('div');
  row.className = 'rel-row';
  row.innerHTML = `<span class="rel-from">${r.from}</span><span class="rel-card">${r.card}</span><span class="rel-arrow">\u2192</span><span class="rel-to">${r.to}</span><span class="rel-label">${r.label}</span>`;
  relGrid.appendChild(row);
});

// Render enums
const enumGrid = document.getElementById('enumGrid');
schema.enums.forEach(e => {
  const card = document.createElement('div');
  card.className = 'enum-card';
  card.innerHTML = `<div class="enum-header">${e.name}</div><div class="enum-values">${e.values.map(v => `<div class="enum-val">${v}</div>`).join('')}</div>`;
  enumGrid.appendChild(card);
});

// Filter functions
function showAll() {
  document.querySelectorAll('.table-card').forEach(c => { c.classList.remove('highlight', 'dimmed'); });
  document.querySelectorAll('.domain-section').forEach(s => { s.style.display = ''; });
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('search').value = '';
}

function filterDomain(domain) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-domain="${domain}"]`);
  if (btn) btn.classList.add('active');

  document.querySelectorAll('.table-card').forEach(card => {
    if (card.dataset.domain === domain) {
      card.classList.add('highlight');
      card.classList.remove('dimmed');
    } else {
      card.classList.remove('highlight');
      card.classList.add('dimmed');
    }
  });
  document.querySelectorAll('.domain-section').forEach(s => { s.style.display = ''; });
}

function filterTables(query) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  if (!query.trim()) { showAll(); return; }
  const q = query.toLowerCase();
  document.querySelectorAll('.table-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(q)) {
      card.classList.add('highlight');
      card.classList.remove('dimmed');
    } else {
      card.classList.remove('highlight');
      card.classList.add('dimmed');
    }
  });
}
</script>
</body>
